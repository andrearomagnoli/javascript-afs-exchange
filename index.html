<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Assegnatore a Vincoli</title>

  <!-- BOOTSTRAP CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

  <!-- BOOTSTRAP JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>

  <!-- IL TUO SCRIPT -->
  <script src="script.js" defer></script>
</head>

<body class="bg-light">

<div class="container py-4">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Assegnatore Ragazzi → Famiglie</h1>

    <!-- Tema -->
    <div class="form-check form-switch">
      <input class="form-check-input" type="checkbox" id="themeToggle">
      <label class="form-check-label" for="themeToggle">Tema scuro</label>
    </div>
  </div>

  <!-- ALERT -->
  <div id="alert-area"></div>

  <div class="row g-4">

    <!-- RAGAZZI -->
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white d-flex justify-content-between">
          <span>Ragazzi</span>
          <button class="btn btn-light btn-sm" onclick="addRagazzoRow()">+</button>
        </div>
        <div class="card-body p-0">
          <table class="table table-striped mb-0" id="ragazzi-table">
            <thead>
              <tr>
                <th>Nome</th>
                <th>Sesso</th>
                <th>NO (tags)</th>
                <th></th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- FAMIGLIE -->
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-header bg-success text-white d-flex justify-content-between">
          <span>Famiglie</span>
          <button class="btn btn-light btn-sm" onclick="addFamigliaRow()">+</button>
        </div>
        <div class="card-body p-0">
          <table class="table table-striped mb-0" id="famiglie-table">
            <thead>
              <tr>
                <th>Nome</th>
                <th>Capacità+Sesso</th>
                <th>Tags</th>
                <th>Solo stesso sesso</th>
                <th></th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>

  </div>

  <div class="text-center mt-4">
    <button id="solve-btn" class="btn btn-lg btn-primary px-5">Calcola</button>
  </div>

  <div class="card shadow-sm mt-4">
    <div class="card-header bg-dark text-white">
      Risultato
    </div>
    <div class="card-body">
      <div id="output"></div>
    </div>
  </div>

</div>

</body>
</html>
