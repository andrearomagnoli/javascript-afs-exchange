<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Assegnatore AFS</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- JS -->
  <script src="script.js" defer></script>
</head>

<body class="bg-light">

<div class="container py-4">

  <!-- Header -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="mb-0">Assegnatore AFS</h1>

    <div class="form-check form-switch">
      <input class="form-check-input" type="checkbox" id="themeToggle">
      <label class="form-check-label" for="themeToggle">Tema scuro</label>
    </div>
  </div>

  <div id="alert-area"></div>

  <div class="row g-4">

    <!-- Ragazzi -->
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white d-flex justify-content-between">
          <span>Ragazzi</span>
          <button class="btn btn-light btn-sm" onclick="addRagazzoRow()">+</button>
        </div>

        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-striped mb-0" id="ragazzi-table">
              <thead>
                <tr>
                  <th>Nome</th>
                  <th>Sesso</th>
                  <th>NO (tags)</th>
                  <th></th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- Famiglie -->
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-header bg-success text-white d-flex justify-content-between">
          <span>Famiglie</span>
          <button class="btn btn-light btn-sm" onclick="addFamigliaRow()">+</button>
        </div>

        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-striped mb-0" id="famiglie-table">
              <thead>
                <tr>
                  <th>Nome</th>
                  <th>Capacità+Sesso</th>
                  <th>Tags</th>
                  <th>Solo stesso sesso</th>
                  <th></th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- Calcola -->
  <div class="text-center mt-4">
    <button id="solve-btn" class="btn btn-lg btn-primary px-5">Calcola</button>
  </div>

  <!-- Risultato -->
  <div class="card shadow-sm mt-4">
    <div class="card-header bg-dark text-white">Risultato</div>
    <div class="card-body">
      <div id="output"></div>
    </div>
  </div>

</div>

</body>
</html>
