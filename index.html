<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Assegnatore a Vincoli</title>

  <!-- BOOTSTRAP -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

<div class="container py-4">

  <h1 class="mb-4 text-center">Assegnatore Ragazzi → Famiglie</h1>

  <div class="row g-4">

    <!-- RAGAZZI -->
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
          Ragazzi
        </div>
        <div class="card-body">
          <textarea id="ragazzi-input" class="form-control" rows="10" placeholder="Es:
Paolo Rossi, M, NO: cani
Chiara Bianchi, F, NO: gatti
Giulia Verdi, F
Rebecca Viola, F"></textarea>
        </div>
      </div>
    </div>

    <!-- FAMIGLIE -->
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-header bg-success text-white">
          Famiglie
        </div>
        <div class="card-body">
          <textarea id="famiglie-input" class="form-control" rows="10" placeholder="Es:
Rossi, 1F
Bianchi, 2M, TAGS: gatti
Viola, 1F, TAGS: gatti
Gialli, 1F"></textarea>
        </div>
      </div>
    </div>

  </div>

  <div class="text-center mt-4">
    <button id="solve-btn" class="btn btn-lg btn-primary px-5">Calcola</button>
  </div>

  <div class="card shadow-sm mt-4">
    <div class="card-header bg-dark text-white">
      Risultato
    </div>
    <div class="card-body">
      <pre id="output" class="mb-0"></pre>
    </div>
  </div>

</div>

<script src="script.js"></script>

<!-- BOOTSTRAP JS (opzionale) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
